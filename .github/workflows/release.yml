name: Release

on: workflow_dispatch

jobs:
  publish-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.SUBMODULES }}
          submodules: recursive

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install

      - name: Publish releases
        env:
          # These values are used for auto updates signing
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          # ASCPROVIDER: ${{ secrets.ASCPROVIDER}}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Note that we have to build each binary on the right platform
        # because we have native modules which otherwise won't work/compile correctly
        run: |
          npm run postinstall
          npm run build
          npm exec electron-builder -- --publish always

  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.SUBMODULES }}
          submodules: recursive

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          npm install

      - name: Publish releases
        env:
          # currently, no code signing is used for windows
          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Note that we have to build each binary on the right platform
        # because we have native modules which otherwise won't work/compile correctly
        run: |
          npm run postinstall
          npm run build
          npm exec electron-builder -- --publish always
