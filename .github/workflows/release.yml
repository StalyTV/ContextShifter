name: Release

on: workflow_dispatch

jobs:
  publish-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES }}
          submodules: recursive

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Specify the Python version here

      - name: Install dependencies for node-hid and usb
        run: |
          brew install libusb
          brew install libudev-dev


      - name: Install dependencies
        run: |
          npm install --loglevel verbose

      - name: Publish releases
        env:
          # These values are used for auto updates signing
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Note that we have to build each binary on the right platform
        # because we have native modules which otherwise won't work/compile correctly
        run: |
          npm run postinstall
          npm run build
          npm exec electron-builder -- --publish always

  publish-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES }}
          submodules: recursive

      - name: Install Node, NPM and Yarn
        uses: actions/setup-node@v4
        with:
          node-version: 21

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Specify the Python version here

      - name: Install Windows Build Tools
        run: npm install --global --production windows-build-tools

      - name: Install dependencies
        run: |
          npm install

      - name: Publish releases
        env:
          # currently, no code signing is used for windows
          # This is used for uploading release assets to github
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        # Note that we have to build each binary on the right platform
        # because we have native modules which otherwise won't work/compile correctly
        run: |
          npm run postinstall
          npm run build
          npm exec electron-builder -- --publish always
